# .upptimerc.yml

owner: StellarTrail-io
repo: stellartrail-status

# Add your sites here
sites:
  - name: StellarTrail Main Site
    url: https://stellartrail.io
  - name: StellarTrail API
    url: https://api.stellartrail.io/api/health
  - name: StellarTrail Charting
    url: https://api.stellartrail.io/api/health/charting
  - name: StellarTrail AI Coach
    url: https://api.stellartrail.io/api/health/coach
  - name: StellarTrail Queues
    url: https://api.stellartrail.io/api/health/queues

status-website:
  # Uncomment and set cname when DNS is ready:
  # cname: status.stellartrail.io
  baseUrl: /stellartrail-status
  logoUrl: https://raw.githubusercontent.com/StellarTrail-io/StellarTrail/main/public/st-logo.png
  name: StellarTrail Status
  introTitle: "**StellarTrail** System Status"
  introMessage: This is the real-time status page for StellarTrail's services. If there are any active incidents, they will be reported here.

  theme: dark

  customHeadHtml: |
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  customCss: |
    /* ========================================
       StellarTrail Design System — Status Page
       Deep space glassmorphism with teal accents
       ======================================== */

    :root {
      --color-primary: #18F0E9 !important;
      --color-primary-light: #5DF5EF !important;
      --color-text: #D8DCE8 !important;
      --color-background: #0B0116 !important;
      --color-card-background: #1E1538 !important;
      --color-border: #1E293B !important;
      --color-success: #22C55E !important;
      --color-danger: #EF4444 !important;
      --color-warning: #F59E0B !important;
    }

    /* === Global === */
    * { box-sizing: border-box; }

    body {
      background-color: #0B0116 !important;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(24, 240, 233, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(24, 240, 233, 0.02) 0%, transparent 50%);
      background-attachment: fixed;
      color: #D8DCE8 !important;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* === Navigation / Header === */
    nav, header, .navbar {
      background: rgba(19, 14, 37, 0.9) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
      border-bottom: 1px solid rgba(24, 240, 233, 0.15) !important;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3) !important;
    }

    nav a, header a, .navbar a {
      color: #D8DCE8 !important;
      font-weight: 600 !important;
      letter-spacing: 0.025em !important;
      transition: color 200ms cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    nav a:hover, header a:hover, .navbar a:hover,
    nav a.active, header a.active, .navbar a.active {
      color: #18F0E9 !important;
    }

    /* Logo text in nav */
    nav .logo, header .logo, .navbar .logo,
    nav strong, header strong {
      color: #F5F7FA !important;
      font-weight: 700 !important;
      letter-spacing: -0.025em !important;
    }

    /* === Typography === */
    h1, h2, h3, h4, h5, h6 {
      color: #F5F7FA !important;
      font-weight: 700 !important;
      letter-spacing: -0.025em !important;
    }

    h1 strong, h2 strong {
      color: #18F0E9 !important;
      text-shadow: 0 0 30px rgba(24, 240, 233, 0.3) !important;
    }

    p, .description, .intro {
      color: #8A8FA8 !important;
      line-height: 1.625 !important;
    }

    a {
      color: #18F0E9 !important;
      transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    a:hover {
      color: #5DF5EF !important;
      text-shadow: 0 0 10px rgba(24, 240, 233, 0.3) !important;
    }

    /* === Status Cards === */
    .service-card, .status-card, article,
    main section > div, .card {
      background: #1E1538 !important;
      border: 1px solid #1E293B !important;
      border-radius: 0.75rem !important;
      transition: all 300ms cubic-bezier(0, 0, 0.2, 1) !important;
    }

    .service-card:hover, .status-card:hover, article:hover,
    .card:hover {
      border-color: rgba(24, 240, 233, 0.3) !important;
      box-shadow: 0 0 20px -5px rgba(24, 240, 233, 0.1) !important;
      transform: translateY(-1px) !important;
    }

    /* Service name inside cards */
    .service-card h3, .status-card h3,
    article h3, .card h3 {
      color: #F5F7FA !important;
      font-weight: 600 !important;
    }

    /* Muted text in cards (uptime %, response time) */
    .service-card p, .status-card p,
    article p, .card p,
    .service-card span, .status-card span {
      color: #8A8FA8 !important;
    }

    /* === Incident Cards (Active) === */
    .incident, .incident-card,
    [class*="incident"] {
      background: rgba(239, 68, 68, 0.1) !important;
      border: 1px solid rgba(239, 68, 68, 0.3) !important;
      border-left: 4px solid #EF4444 !important;
      border-radius: 0.75rem !important;
    }

    /* === Status Indicators === */
    /* Up / Operational */
    [class*="up"], [class*="success"], [class*="operational"],
    .status-up {
      color: #22C55E !important;
    }

    /* Down / Major outage */
    [class*="down"], [class*="danger"], [class*="major"],
    .status-down {
      color: #EF4444 !important;
    }

    /* Degraded / Partial */
    [class*="degraded"], [class*="warning"], [class*="partial"],
    .status-degraded {
      color: #F59E0B !important;
    }

    /* Status dots / circles */
    .status-circle, .status-dot,
    [class*="status-indicator"] {
      box-shadow: 0 0 8px currentColor !important;
    }

    /* === Overall Status Banner === */
    .overall-status, section:first-of-type > div:first-child,
    [class*="overall"] {
      border-radius: 0.75rem !important;
      border: 1px solid rgba(24, 240, 233, 0.2) !important;
    }

    /* === Time Range Tabs (24h, 7d, 30d, etc.) === */
    .time-range a, .tabs a, [class*="tab"] a,
    button[class*="tab"], .period-selector a {
      color: #8A8FA8 !important;
      font-weight: 600 !important;
      font-size: 0.875rem !important;
      letter-spacing: 0.05em !important;
      text-transform: uppercase !important;
      padding: 0.375rem 0.75rem !important;
      border-radius: 0.375rem !important;
      transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    .time-range a:hover, .tabs a:hover, [class*="tab"] a:hover,
    button[class*="tab"]:hover, .period-selector a:hover {
      color: #18F0E9 !important;
      background: rgba(24, 240, 233, 0.1) !important;
    }

    .time-range a.active, .tabs a.active, [class*="tab"] a.active,
    button[class*="tab"].active, .period-selector a.active,
    .time-range a[aria-selected="true"], .tabs a[aria-selected="true"] {
      color: #18F0E9 !important;
      background: rgba(24, 240, 233, 0.15) !important;
      font-weight: 700 !important;
    }

    /* === Buttons === */
    .btn, button, [class*="button"] {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
      font-weight: 700 !important;
      letter-spacing: 0.025em !important;
      border-radius: 0.5rem !important;
      transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    .btn-primary, .btn.btn-primary,
    button[class*="primary"] {
      background-color: #18F0E9 !important;
      color: #07010F !important;
      border: none !important;
      box-shadow: 0 10px 15px -3px rgba(24, 240, 233, 0.2) !important;
    }

    .btn-primary:hover, .btn.btn-primary:hover,
    button[class*="primary"]:hover {
      background-color: #5DF5EF !important;
      box-shadow: 0 20px 25px -5px rgba(24, 240, 233, 0.3) !important;
      transform: translateY(-1px) !important;
    }

    /* === Graphs & Charts === */
    svg text {
      fill: #8A8FA8 !important;
      font-family: 'Inter', sans-serif !important;
    }

    svg line, svg path.grid {
      stroke: #1E293B !important;
    }

    /* === Footer === */
    footer {
      background: #07010F !important;
      border-top: 1px solid #1E293B !important;
      color: #8A8FA8 !important;
    }

    footer a {
      color: #8A8FA8 !important;
    }

    footer a:hover {
      color: #18F0E9 !important;
    }

    /* === Scrollbar === */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0B0116;
    }

    ::-webkit-scrollbar-thumb {
      background: #1A1230;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #1E1538;
    }

    /* === Selection === */
    ::selection {
      background: rgba(24, 240, 233, 0.3);
      color: #F5F7FA;
    }

    /* === Subtle Animations === */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px currentColor; }
      50% { box-shadow: 0 0 16px currentColor; }
    }

    .status-down .status-circle,
    .status-degraded .status-circle {
      animation: pulse-glow 2s ease-in-out infinite !important;
    }
