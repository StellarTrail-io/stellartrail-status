# .upptimerc.yml

owner: StellarTrail-io
repo: stellartrail-status

# Add your sites here
sites:
  - name: StellarTrail Main Site
    url: https://stellartrail.io
  - name: StellarTrail API
    url: https://api.stellartrail.io/health
  - name: StellarTrail Charting
    url: https://api.stellartrail.io/charting/health
  - name: StellarTrail AI Coach
    url: https://api.stellartrail.io/coach/health

status-website:
  # Uncomment and set cname when DNS is ready:
  # cname: status.stellartrail.io
  baseUrl: /stellartrail-status
  logoUrl: https://raw.githubusercontent.com/StellarTrail-io/StellarTrail/main/public/st-logo.png
  name: StellarTrail Status
  introTitle: "**StellarTrail** System Status"
  introMessage: This is the real-time status page for StellarTrail's services. If there are any active incidents, they will be reported here.

  theme: dark

  # Custom CSS to match StellarTrail's exact branding
  customCss: |
    /* Base theme overrides */
    :root {
      --color-primary: #18F0E9 !important;
      --color-primary-light: #5DF5EF !important;
      --color-text: #F5F7FA !important;
      --color-background: #0B0116 !important;
      --color-card-background: #1E1538 !important;
      --color-border: #1E293B !important;
      --color-success: #22C55E !important;
      --color-danger: #EF4444 !important;
      --color-warning: #F59E0B !important;
    }

    /* Keep it clean */
    body {
      background-color: var(--color-background);
      color: var(--color-text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Navbar styling */
    header {
      background-color: #130E25 !important;
      border-bottom: 1px solid var(--color-border);
    }
    
    header a.active, header a:hover {
        color: var(--color-primary) !important;
    }

    /* Status Cards */
    .status-card {
      background-color: var(--color-card-background) !important;
      border: 1px solid var(--color-border) !important;
      border-radius: 0.5rem;
    }

    /* Overall status box */
    section.overall-status {
      border-radius: 0.75rem;
    }
    
    /* Make the text glow slightly like the main site */
    h1, h2, h3, a.active {
       text-shadow: 0 0 10px rgba(24, 240, 233, 0.2);
    }

    /* Buttons */
    .btn.btn-primary {
      background-color: var(--color-primary) !important;
      color: #07010F !important;
      font-weight: bold;
    }
    .btn.btn-primary:hover {
      background-color: var(--color-primary-light) !important;
      box-shadow: 0 0 20px -5px rgba(24, 240, 233, 0.3);
    }
