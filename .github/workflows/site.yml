# Upptime @v1.41.0

name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  release:
    name: Build and deploy site
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Generate site
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
      - name: Apply StellarTrail theme
        run: |
          EXPORT_DIR="site/status-page/__sapper__/export"

          # Replace dark.css with StellarTrail design system
          cat > "$EXPORT_DIR/themes/dark.css" << 'DARKEOF'
          :root {
            --body-background-color: #0B0116;
            --body-text-color: #D8DCE8;
            --card-background-color: #1E1538;
            --nav-background-color: #130E25;
            --nav-border-bottom-color: rgba(24, 240, 233, 0.15);
            --nav-current-border-bottom-color: #18F0E9;
            --card-border-color: #1E293B;
            --down-border-left-color: #EF4444;
            --down-background-color: rgba(239, 68, 68, 0.15);
            --down-color-color: #EF4444;
            --degraded-border-left-color: #F59E0B;
            --degraded-color-color: #F59E0B;
            --up-border-left-color: #22C55E;
            --up-color-color: #22C55E;
            --tag-color: #07010F;
            --tag-up-background-color: #22C55E;
            --tag-down-background-color: #EF4444;
            --tag-degraded-background-color: #F59E0B;
            --change-background-color: #F59E0B;
            --error-button-border-color: #18F0E9;
            --error-button-background-color: rgba(24, 240, 233, 0.1);
            --error-button-color: #18F0E9;
            --submit-button-border-color: #18F0E9;
            --submit-button-background-color: #18F0E9;
            --submit-button-color: #07010F;
            --graph-opacity: 1;
            --graph-filter: none;
          }
          DARKEOF

          # Replace global.css with StellarTrail styled version
          cat > "$EXPORT_DIR/global.css" << 'GLOBALEOF'
          @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

          body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, Fira Sans, Droid Sans, Helvetica Neue, sans-serif;
            line-height: 1.5;
            padding-bottom: 2.5rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
          }
          h1, h2, h3, h4, h5, h6 { margin: 0 0 0.5em 0; font-weight: 700; line-height: 1.2; letter-spacing: -0.025em; }
          h1 { font-size: 2em; }
          h1 strong { color: #18F0E9; text-shadow: 0 0 30px rgba(24, 240, 233, 0.3); }
          a { color: #18F0E9; transition: color 200ms ease; }
          a:hover { color: #5DF5EF; }
          @media (min-width: 400px) { body { font-size: 16px; } }
          .container { max-width: 800px; margin: 0 auto; padding: 0 2rem; box-sizing: border-box; }
          article { padding: 1rem 1.25rem; position: relative; border-radius: 0.75rem; border: 1px solid; transition: border-color 200ms ease, box-shadow 200ms ease, transform 200ms ease; }
          article:hover { border-color: rgba(24, 240, 233, 0.3) !important; box-shadow: 0 0 20px -5px rgba(24, 240, 233, 0.1); transform: translateY(-1px); }
          article.link a::after { content: ""; position: absolute; left: 0; right: 0; top: 0; bottom: 0; }
          article + article { margin-top: 0.5rem; }
          article + h3 { margin-top: 1rem; }
          h3 { opacity: 0.75; }
          h4 { font-weight: bold; }
          article.down { border-left: 0.2rem solid; }
          article.degraded { border-left: 0.2rem solid; }
          article.up { border-left: 0.2rem solid; }
          .f { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
          section + h2 { margin-top: 2rem; }
          .tag { display: inline-block; padding: 0.33rem 0.5rem; border-radius: 0.375rem; font-size: 70%; font-weight: 600; vertical-align: middle; margin-top: -0.2rem; margin-left: 0.5rem; }
          dl { margin-bottom: 1.5rem; }
          dl dt { font-weight: bold; }
          dl dd { margin: 0 0 1rem 0; }
          nav { border-bottom: 1px solid; }
          nav a { font-weight: 600; }
          [aria-current] { border-bottom: 2px solid; }
          a.error-button { border: 0.1rem solid; border-radius: 0.5rem; }
          .submit-button { background: #18F0E9; color: #07010F; border-color: transparent; font-weight: 700; border-radius: 0.5rem; }

          /* Theming via CSS variables */
          body { background: var(--body-background-color); color: var(--body-text-color); }
          code { color: var(--code-color); background: var(--code-background-color); }
          article { background: var(--card-background-color); border-color: var(--card-border-color); }
          article.down { border-left-color: var(--down-border-left-color) !important; color: var(--down-color-color); }
          article.down-active { background: var(--down-background-color); border-color: var(--down-border-left-color); }
          article.degraded { border-left-color: var(--degraded-border-left-color) !important; color: var(--degraded-color-color); }
          article.up { border-left-color: var(--up-border-left-color) !important; color: var(--up-color-color); }
          .tag { color: var(--tag-color); }
          .tag.closed, .tag.up { background: var(--tag-up-background-color) !important; }
          .tag.open, .tag.down { background: var(--tag-down-background-color) !important; }
          .tag.degraded { background: var(--tag-degraded-background-color) !important; }
          .changed + section .data { background: var(--change-background-color); }
          nav { border-bottom-color: var(--nav-border-bottom-color); background: var(--nav-background-color); }
          [aria-current] { border-bottom-color: var(--nav-current-border-bottom-color); }
          a.error-button { border-color: var(--error-button-border-color); background: var(--error-button-background-color); color: var(--error-button-color); }
          .submit-button { background: var(--submit-button-background-color); color: var(--submit-button-color); border-color: var(--submit-button-border-color); }
          article .graph { opacity: var(--graph-opacity); filter: var(--graph-filter); }

          /* Footer */
          footer { background-color: #07010F; border-top: 1px solid #1E293B; color: #8A8FA8; }
          footer a { color: #8A8FA8; }
          footer a:hover { color: #18F0E9; }

          /* Scrollbar */
          ::-webkit-scrollbar { width: 8px; height: 8px; }
          ::-webkit-scrollbar-track { background: #0B0116; }
          ::-webkit-scrollbar-thumb { background: #1A1230; border-radius: 4px; }
          ::-webkit-scrollbar-thumb:hover { background: #1E1538; }

          ::selection { background: rgba(24, 240, 233, 0.3); color: #F5F7FA; }
          GLOBALEOF

          echo "StellarTrail theme applied to dark.css and global.css"
          head -5 "$EXPORT_DIR/themes/dark.css"
      - name: List site output
        run: |
          echo "=== Checking if site was built ==="
          ls -la site/status-page/__sapper__/export/ 2>/dev/null || echo "SAPPER EXPORT DIR NOT FOUND"
          echo "=== Checking site directory ==="
          find site -type f -name "*.html" 2>/dev/null | head -20 || echo "NO HTML FILES FOUND"
      - uses: peaceiris/actions-gh-pages@v4
        name: GitHub Pages Deploy
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: "site/status-page/__sapper__/export/"
          force_orphan: true
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
