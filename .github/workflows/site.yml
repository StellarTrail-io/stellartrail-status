# Upptime @v1.41.0

name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  release:
    name: Build and deploy site
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Generate site
        uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
      - name: List site output
        run: |
          echo "=== Checking if site was built ==="
          ls -la site/status-page/__sapper__/export/ 2>/dev/null || echo "SAPPER EXPORT DIR NOT FOUND"
          echo "=== Checking site directory ==="
          find site -type f -name "*.html" 2>/dev/null | head -20 || echo "NO HTML FILES FOUND"
      - uses: peaceiris/actions-gh-pages@v4
        name: GitHub Pages Deploy
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: "site/status-page/__sapper__/export/"
          force_orphan: true
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
